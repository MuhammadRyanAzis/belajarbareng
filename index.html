<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kaleidoskop Interaktif | Supernova & Dark Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="universe">
    <canvas id="particleCanvas"></canvas>
    <div class="content">
        <div class="hero">
            <h1>✦ SYNAPSE NEXUS ✦</h1>
            <p>supernova | dark mode | realtime visual complex</p>
        </div>

        <div class="dashboard">
            <div class="card">
                <h3>🌀 Klik Orb</h3>
                <div class="orb-container">
                    <div class="interactive-orb" id="magicOrb">✨</div>
                </div>
                <div class="slider-group">
                    <label>🌀 Efek Getaran <span id="vibeValue">0.8</span></label>
                    <input type="range" id="vibeSlider" min="0" max="1.5" step="0.01" value="0.8">
                </div>
                <div class="vibe-indicator" id="vibeIndicator">⚡ Getaran: Aktif</div>
                <div class="info-panel" style="margin-top: 10px;">
                    <span>⚡ Klik: <span id="clickCount">0</span></span>
                    <span>🎯 Terakhir: <span id="lastEffect">-</span></span>
                </div>
                <button id="resetStatsBtn">⟳ Reset Interaksi</button>
            </div>

            <div class="card" style="flex: 2;">
                <h3>🎨 Geometri Reaktif</h3>
                <div class="canvas-area">
                    <canvas id="dynamicCanvas" width="500" height="300" style="width:100%; height:auto; max-width:100%; aspect-ratio:500/300"></canvas>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; justify-content: space-between;">
                    <div>
                        <label style="color:#ffdb9f">🌀 Jumlah objek</label>
                        <input type="range" id="shapeCountSlider" min="3" max="45" step="1" value="18">
                        <span id="countVal" style="color:white">18</span>
                    </div>
                    <div>
                        <label style="color:#ffdb9f">💨 Kecepatan rotasi</label>
                        <input type="range" id="speedSlider" min="0" max="0.03" step="0.001" value="0.012">
                        <span id="speedVal" style="color:white">0.012</span>
                    </div>
                    <button id="chaosBtn">⚡ Kekacauan Visual</button>
                </div>
            </div>

            <div class="card">
                <h3>🌈 Kroma Partikel</h3>
                <div class="slider-group">
                    <label>🎨 Hue Rotasi <span id="hueVal">0</span>°</label>
                    <input type="range" id="hueSlider" min="0" max="360" value="0">
                </div>
                <div class="slider-group">
                    <label>✨ Jumlah Partikel Latar <span id="partCountVal">220</span></label>
                    <input type="range" id="particleCountSlider" min="60" max="500" step="10" value="220">
                </div>
                <button id="toggleWaveBtn">🌊 Aktifkan Gelombang Warna</button>
                <button id="darkModeBtn" style="margin-top: 8px;">🌙 Mode Malam Gelap</button>
                <div class="info-panel" style="margin-top: 12px;">
                    <span>🖱️ Posisi Mouse: </span>
                    <span id="mouseCoord">0,0</span>
                </div>
            </div>
        </div>
        <footer>
            💡 klik orb → supernova | mode malam | teks interaktif mengikuti mouse
        </footer>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
