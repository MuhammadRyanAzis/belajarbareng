<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Gold Dashboard - Full History 2021-2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="dashboard-wrapper">
        <nav class="glass-nav">
            <div class="logo">Q-GOLD</div>
            <div class="nav-links">
                <a href="#" class="active">Grafik</a>
                <a href="#">History</a>
                <a href="#">Market</a>
            </div>
            <div class="nav-auth">
                <button class="btn-primary">Beli Sekarang</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <div class="header-text">
                    <h1>Pasar Emas Global</h1>
                    <p class="subtitle">Analisis Historis Lengkap 2021 - 2026</p>
                </div>
                <div class="filter-controls glass-card">
                    <div class="filter-group">
                        <label for="year-select">Pilih Tahun</label>
                        <select id="year-select" class="glass-dropdown">
                            <option value="2026">2026 (Live)</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                        </select>
                    </div>
                </div>
            </header>

            <section class="chart-section glass-card main-graphic">
                <div class="chart-header-panel">
                    <div class="price-group">
                        <span class="label">Rata-rata Harga Tahun <span id="active-year-label">2026</span></span>
                        <h2 class="price-value" id="main-price">Rp-</h2>
                    </div>
                    <div class="performance-badge" id="performance-tag">
                        <span id="perf-icon">↑</span>
                        <span id="perf-value">0%</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="goldChart"></canvas>
                </div>
                <div id="insight-box" class="insight-box glass-card">
                    <div class="insight-header"><span class="status-dot"></span><h4>QUANTUM ANALYTICS</h4></div>
                    <p id="insight-content">Menganalisis pergerakan pasar...</p>
                </div>
            </section>

            <section class="quick-stats-row">
                <div class="stat-card glass-card high">
                    <span class="stat-label">Tertinggi (<span class="active-year">2026</span>)</span>
                    <span class="stat-num" id="stat-high">-</span>
                </div>
                <div class="stat-card glass-card low">
                    <span class="stat-label">Terendah (<span class="active-year">2026</span>)</span>
                    <span class="stat-num" id="stat-low">-</span>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
