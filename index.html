<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kaleidoskop Interaktif | Supernova & Dark Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: crosshair;
            transition: background 0.5s ease;
        }

        body.dark-mode-active {
            background: radial-gradient(circle at 20% 30%, #020408, #000000);
        }

        .universe {
            position: relative;
            width: 95vw;
            max-width: 1400px;
            min-height: 85vh;
            background: rgba(12, 20, 30, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid rgba(100, 200, 255, 0.25);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        body.dark-mode-active .universe {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 50, 150, 0.4);
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            border-radius: inherit;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .hero {
            text-align: center;
            padding: 0.5rem;
        }

        .hero h1 {
            font-size: clamp(2rem, 8vw, 4.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffe6b0, #ffb347, #ff6a4b, #c86eff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 6s ease infinite;
            letter-spacing: -0.02em;
            text-shadow: 0 0 15px rgba(255,100,100,0.3);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero p {
            color: #b9e2ff;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
        }

        .card {
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            flex: 1;
            min-width: 240px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,200,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transform-style: preserve-3d;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 80, 120, 0.8);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6), 0 0 20px rgba(255,80,120,0.3);
            background: rgba(30, 45, 65, 0.85);
        }

        .card h3 {
            color: #ffdf9c;
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1.6rem;
            border-left: 4px solid #ffaa44;
            padding-left: 0.8rem;
        }

        .orb-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .interactive-orb {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 35% 35%, #ffb347, #ff4d6d);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,80,80,0.7);
            transition: all 0.2s ease;
            animation: floatGlow 3s infinite alternate;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2rem;
            color: white;
            text-shadow: 0 2px 5px black;
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px) scale(1); box-shadow: 0 0 15px #ff8866; }
            100% { transform: translateY(-12px) scale(1.03); box-shadow: 0 0 40px #ff3a6f; }
        }

        .interactive-orb:active {
            transform: scale(0.96);
            transition: 0.05s;
        }

        .slider-group {
            margin: 1rem 0;
        }
        .slider-group label {
            color: #d4f1ff;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }
        input[type="range"] {
            width: 100%;
            margin: 0.5rem 0;
            background: #1e2a3a;
            height: 4px;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffaa66;
            cursor: pointer;
            box-shadow: 0 0 6px #ffcc88;
            transition: 0.1s;
        }

        .canvas-area {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1.8rem;
            padding: 1rem;
            margin-top: 0.5rem;
        }
        #dynamicCanvas {
            display: block;
            width: 100%;
            background: #03070f80;
            border-radius: 1.2rem;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            cursor: crosshair;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            font-size: 0.9rem;
            color: #bbddff;
            background: #0a101cee;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
        }

        button {
            background: linear-gradient(95deg, #2b3b4e, #1c2a3a);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            color: #ffecb3;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        button:hover {
            background: linear-gradient(95deg, #3f556b, #2b3e54);
            transform: scale(0.97);
            color: white;
            box-shadow: 0 5px 12px black;
        }

        .vibe-indicator {
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
            color: #ffaa88;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #88aacc;
            margin-top: 1rem;
        }

        @media (max-width: 760px) {
            .universe {
                padding: 0.8rem;
            }
            .card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="universe">
    <canvas id="particleCanvas"></canvas>
    <div class="content">
        <div class="hero">
            <h1>✦ SYNAPSE NEXUS ✦</h1>
            <p>supernova | dark mode | realtime visual complex</p>
        </div>

        <div class="dashboard">
            <!-- Kartu 1: Orb taktil & klik -->
            <div class="card">
                <h3>🌀 Klik Orb</h3>
                <div class="orb-container">
                    <div class="interactive-orb" id="magicOrb">✨</div>
                </div>
                <div class="slider-group">
                    <label>🌀 Efek Getaran <span id="vibeValue">0.8</span></label>
                    <input type="range" id="vibeSlider" min="0" max="1.5" step="0.01" value="0.8">
                </div>
                <div class="vibe-indicator" id="vibeIndicator">⚡ Getaran: Aktif</div>
                <div class="info-panel" style="margin-top: 10px;">
                    <span>⚡ Klik: <span id="clickCount">0</span></span>
                    <span>🎯 Terakhir: <span id="lastEffect">-</span></span>
                </div>
                <button id="resetStatsBtn">⟳ Reset Interaksi</button>
            </div>

            <!-- Kartu 2: Kanvas Dinamis + kontrol animasi bentuk -->
            <div class="card" style="flex: 2;">
                <h3>🎨 Geometri Reaktif</h3>
                <div class="canvas-area">
                    <canvas id="dynamicCanvas" width="500" height="300" style="width:100%; height:auto; max-width:100%; aspect-ratio:500/300"></canvas>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; justify-content: space-between;">
                    <div>
                        <label style="color:#ffdb9f">🌀 Jumlah objek</label>
                        <input type="range" id="shapeCountSlider" min="3" max="45" step="1" value="18">
                        <span id="countVal" style="color:white">18</span>
                    </div>
                    <div>
                        <label style="color:#ffdb9f">💨 Kecepatan rotasi</label>
                        <input type="range" id="speedSlider" min="0" max="0.03" step="0.001" value="0.012">
                        <span id="speedVal" style="color:white">0.012</span>
                    </div>
                    <button id="chaosBtn">⚡ Kekacauan Visual</button>
                </div>
            </div>

            <!-- Kartu 3: Warna & Efek partikel (real-time) -->
            <div class="card">
                <h3>🌈 Kroma Partikel</h3>
                <div class="slider-group">
                    <label>🎨 Hue Rotasi <span id="hueVal">0</span>°</label>
                    <input type="range" id="hueSlider" min="0" max="360" value="0">
                </div>
                <div class="slider-group">
                    <label>✨ Jumlah Partikel Latar <span id="partCountVal">220</span></label>
                    <input type="range" id="particleCountSlider" min="60" max="500" step="10" value="220">
                </div>
                <button id="toggleWaveBtn">🌊 Aktifkan Gelombang Warna</button>
                <button id="darkModeBtn" style="margin-top: 8px;">🌙 Mode Malam Gelap</button>
                <div class="info-panel" style="margin-top: 12px;">
                    <span>🖱️ Posisi Mouse (canvas): </span>
                    <span id="mouseCoord">0,0</span>
                </div>
            </div>
        </div>
        <footer>
            💡 klik orb → supernova | mode malam | teks interaktif mengikuti mouse
        </footer>
    </div>
</div>

<script>
    (function(){
        // ---------- 1. PARTIKEL LATAR BELAKANG (canvas absolut) ----------
        const particleCanvas = document.getElementById('particleCanvas');
        let pCtx = particleCanvas.getContext('2d');
        let particles = [];
        let particleCount = 220;
        let darkMode = false;
        
        function resizeParticleCanvas() {
            const container = document.querySelector('.universe');
            const rect = container.getBoundingClientRect();
            particleCanvas.width = rect.width;
            particleCanvas.height = rect.height;
            initParticles();
        }
        
        function initParticles() {
            particles = [];
            for(let i=0; i<particleCount; i++) {
                particles.push({
                    x: Math.random() * particleCanvas.width,
                    y: Math.random() * particleCanvas.height,
                    radius: 2 + Math.random() * 4,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.3,
                    alpha: 0.3 + Math.random() * 0.5,
                    colorHue: Math.random() * 360
                });
            }
        }
        
        function updateParticles() {
            if(!particleCanvas.width || !particleCanvas.height) return;
            for(let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if(p.x < 0) p.x = particleCanvas.width;
                if(p.x > particleCanvas.width) p.x = 0;
                if(p.y < 0) p.y = particleCanvas.height;
                if(p.y > particleCanvas.height) p.y = 0;
                p.colorHue = (p.colorHue + 0.5) % 360;
            }
        }
        
        function drawParticles(globalHueOffset) {
            if(!pCtx) return;
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            for(let p of particles) {
                let hue = (p.colorHue + globalHueOffset) % 360;
                let alpha = darkMode ? p.alpha * 0.7 : p.alpha;
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                pCtx.fillStyle = `hsla(${hue}, 75%, 65%, ${alpha})`;
                pCtx.fill();
                pCtx.shadowBlur = 5;
                pCtx.shadowColor = `hsl(${hue}, 80%, 70%)`;
                pCtx.fill();
            }
            pCtx.shadowBlur = 0;
        }
        
        // ---------- 2. KANVAS DINAMIS (geometri kompleks interaktif) ----------
        const dynCanvas = document.getElementById('dynamicCanvas');
        const ctx = dynCanvas.getContext('2d');
        let width = 500, height = 300;
        
        function resizeDynamicCanvas() {
            const container = dynCanvas.parentElement;
            const computedWidth = container.clientWidth;
            dynCanvas.width = computedWidth;
            dynCanvas.height = computedWidth * (300/500);
            width = dynCanvas.width;
            height = dynCanvas.height;
            drawShapes();
        }
        window.addEventListener('resize', () => {
            resizeParticleCanvas();
            resizeDynamicCanvas();
        });
        
        // parameter bentuk
        let shapeCount = 18;
        let rotationSpeed = 0.012;
        let angleOffset = 0;
        let shapesArray = [];
        let waveMode = false;
        let globalHue = 0;
        
        // Efek supernova
        let supernovaActive = false;
        let supernovaRadius = 0;
        let supernovaX = 0, supernovaY = 0;
        
        // Teks mengambang
        let floatingTexts = [];
        
        function initShapes() {
            shapesArray = [];
            for(let i=0; i<shapeCount; i++) {
                let radius = 15 + Math.random() * 28;
                let offsetAngle = (Math.PI * 2 / shapeCount) * i;
                let distFromCenter = Math.min(width, height) * 0.28 + Math.random() * 20;
                shapesArray.push({
                    radius: radius,
                    baseXOffset: Math.cos(offsetAngle) * distFromCenter,
                    baseYOffset: Math.sin(offsetAngle) * distFromCenter,
                    angleSpeed: 0.005 + Math.random() * 0.01,
                    phase: Math.random() * Math.PI * 2,
                    type: Math.floor(Math.random() * 3),
                });
            }
        }
        
        function drawShapes() {
            if(!ctx) return;
            ctx.clearRect(0, 0, width, height);
            const centerX = width/2;
            const centerY = height/2;
            
            let grad = ctx.createLinearGradient(0, 0, width, height);
            if(darkMode) {
                grad.addColorStop(0, `hsla(${globalHue}, 50%, 5%, 0.9)`);
                grad.addColorStop(1, `hsla(${(globalHue+180)%360}, 60%, 3%, 0.95)`);
            } else {
                grad.addColorStop(0, `hsla(${globalHue}, 60%, 12%, 0.7)`);
                grad.addColorStop(1, `hsla(${(globalHue+180)%360}, 70%, 8%, 0.9)`);
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            let mouseX = mouseCanvasX, mouseY = mouseCanvasY;
            
            for(let i=0; i<shapesArray.length; i++) {
                let s = shapesArray[i];
                let timeAngle = angleOffset + s.phase;
                let moveX = Math.sin(timeAngle * 1.7) * 6;
                let moveY = Math.cos(timeAngle * 1.2) * 6;
                let x = centerX + s.baseXOffset + moveX;
                let y = centerY + s.baseYOffset + moveY;
                
                let dx = mouseX - x;
                let dy = mouseY - y;
                let dist = Math.hypot(dx, dy);
                if(dist < 70 && dist > 5) {
                    let angleMouse = Math.atan2(dy, dx);
                    let force = (70 - dist) / 70 * 12;
                    x -= Math.cos(angleMouse) * force;
                    y -= Math.sin(angleMouse) * force;
                }
                x = Math.min(width-15, Math.max(15, x));
                y = Math.min(height-15, Math.max(15, y));
                
                let hueShape = (globalHue + i * 25) % 360;
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${hueShape}, 85%, 65%)`;
                ctx.fillStyle = `hsla(${hueShape}, 85%, 65%, 0.85)`;
                ctx.beginPath();
                if(s.type === 0) {
                    ctx.arc(x, y, s.radius, 0, Math.PI*2);
                    ctx.fill();
                } else if(s.type === 1) {
                    let ang = angleOffset * 5 + i;
                    let r = s.radius;
                    for(let t=0; t<3; t++) {
                        let a = ang + (t * Math.PI*2/3);
                        let px = x + Math.cos(a)*r;
                        let py = y + Math.sin(a)*r;
                        if(t===0) ctx.moveTo(px,py);
                        else ctx.lineTo(px,py);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else {
                    let size = s.radius * 1.2;
                    ctx.fillRect(x-size/2, y-size/2, size, size);
                }
                ctx.restore();
                
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${hueShape}, 70%, 70%, 0.3)`;
                ctx.lineWidth = 1.2;
                for(let j=i+1; j<shapesArray.length; j+=3) {
                    let s2 = shapesArray[j];
                    let x2 = centerX + s2.baseXOffset + Math.sin(angleOffset * 1.7 + s2.phase) * 6;
                    let y2 = centerY + s2.baseYOffset + Math.cos(angleOffset * 1.2 + s2.phase) * 6;
                    let dx2 = mouseX - x2;
                    let dy2 = mouseY - y2;
                    let dist2 = Math.hypot(dx2, dy2);
                    if(dist2 < 70 && dist2 > 5) {
                        let angM = Math.atan2(dy2, dx2);
                        let force = (70 - dist2) / 70 * 12;
                        x2 -= Math.cos(angM) * force;
                        y2 -= Math.sin(angM) * force;
                    }
                    ctx.moveTo(x, y);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }
            
            // Efek supernova
            if(supernovaActive) {
                ctx.beginPath();
                ctx.arc(supernovaX, supernovaY, supernovaRadius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 200, 100, ${1 - supernovaRadius/80})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(supernovaX, supernovaY, supernovaRadius * 0.6, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 100, 50, ${0.8 - supernovaRadius/80})`;
                ctx.fill();
                supernovaRadius += 5;
                if(supernovaRadius > 80) supernovaActive = false;
            }
            
            // Teks mengambang
            for(let i=0; i<floatingTexts.length; i++) {
                let t = floatingTexts[i];
                ctx.font = `${t.size}px Arial`;
                ctx.fillStyle = `hsla(${t.hue}, 80%, 65%, ${t.alpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = `hsl(${t.hue}, 80%, 60%)`;
                ctx.fillText(t.text, t.x, t.y);
                t.y -= t.speed;
                t.alpha -= 0.01;
                t.size += 0.3;
                if(t.alpha <= 0 || t.y < 0) {
                    floatingTexts.splice(i,1);
                    i--;
                }
            }
            ctx.shadowBlur = 0;
            
            if(mousePresent && rippleIntensity > 0) {
                ctx.beginPath();
                ctx.arc(mouseCanvasX, mouseCanvasY, rippleRadius, 0, Math.PI*2);
                ctx.strokeStyle = `hsla(${globalHue+40}, 100%, 70%, 0.8)`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                rippleRadius += 3;
                if(rippleRadius > 50) rippleIntensity = 0;
            }
        }
        
        let angle = 0;
        let rippleIntensity = 0;
        let rippleRadius = 5;
        let mousePresent = false;
        let mouseCanvasX = width/2, mouseCanvasY = height/2;
        
        let clickCounter = 0;
        let lastEffectMsg = "None";
        let vibeFactor = 0.8;
        
        const orb = document.getElementById('magicOrb');
        const clickSpan = document.getElementById('clickCount');
        const lastEffectSpan = document.getElementById('lastEffect');
        const vibeSlider = document.getElementById('vibeSlider');
        const vibeValSpan = document.getElementById('vibeValue');
        const vibeIndicator = document.getElementById('vibeIndicator');
        const resetBtn = document.getElementById('resetStatsBtn');
        const shapeSlider = document.getElementById('shapeCountSlider');
        const countValSpan = document.getElementById('countVal');
        const speedSlider = document.getElementById('speedSlider');
        const speedValSpan = document.getElementById('speedVal');
        const chaosBtn = document.getElementById('chaosBtn');
        const hueSlider = document.getElementById('hueSlider');
        const hueValSpan = document.getElementById('hueVal');
        const particleCountSlider = document.getElementById('particleCountSlider');
        const partCountSpan = document.getElementById('partCountVal');
        const toggleWaveBtn = document.getElementById('toggleWaveBtn');
        const darkModeBtn = document.getElementById('darkModeBtn');
        const mouseCoordSpan = document.getElementById('mouseCoord');
        
        // Event orb dengan efek supernova
        orb.addEventListener('click', (e) => {
            clickCounter++;
            clickSpan.innerText = clickCounter;
            lastEffectMsg = `💥 SUPERNOVA! 💥`;
            lastEffectSpan.innerText = lastEffectMsg;
            
            // Efek supernova
            const rect = orb.getBoundingClientRect();
            const universeRect = document.querySelector('.universe').getBoundingClientRect();
            const canvasRect = dynCanvas.getBoundingClientRect();
            supernovaX = (rect.left + rect.right)/2 - canvasRect.left;
            supernovaY = (rect.top + rect.bottom)/2 - canvasRect.top;
            supernovaActive = true;
            supernovaRadius = 5;
            
            // Tambah teks mengambang
            floatingTexts.push({
                text: '✨ SUPERNOVA! ✨',
                x: supernovaX - 40,
                y: supernovaY - 20,
                speed: 1.5,
                alpha: 1,
                size: 18,
                hue: Math.random() * 360
            });
            
            rippleIntensity = 1;
            rippleRadius = 8;
            mousePresent = true;
            
            orb.style.transform = `scale(${1 - vibeFactor*0.15})`;
            setTimeout(() => { orb.style.transform = ''; }, 150);
            
            for(let i=0;i<50;i++) {
                particles.push({
                    x: Math.random() * particleCanvas.width,
                    y: Math.random() * particleCanvas.height,
                    radius: 2+Math.random()*6,
                    vx: (Math.random()-0.5)*3,
                    vy: (Math.random()-0.5)*3,
                    alpha: 0.9,
                    colorHue: Math.random()*360
                });
            }
            setTimeout(() => {
                if(particles.length > particleCount+80) particles.splice(particleCount, particles.length-particleCount);
            }, 1000);
        });
        
        vibeSlider.addEventListener('input', (e) => {
            vibeFactor = parseFloat(e.target.value);
            vibeValSpan.innerText = vibeFactor.toFixed(2);
            if(vibeFactor > 1) {
                vibeIndicator.innerHTML = '⚡ Getaran: INTENS! 🔥';
                vibeIndicator.style.color = '#ff6666';
            } else if(vibeFactor < 0.3) {
                vibeIndicator.innerHTML = '💤 Getaran: Lembut';
                vibeIndicator.style.color = '#88aaff';
            } else {
                vibeIndicator.innerHTML = '⚡ Getaran: Aktif';
                vibeIndicator.style.color = '#ffaa88';
            }
        });
        
        resetBtn.addEventListener('click', () => {
            clickCounter = 0;
            clickSpan.innerText = '0';
            lastEffectSpan.innerText = 'reset';
            lastEffectMsg = 'reset';
            floatingTexts.push({
                text: '🔄 RESET! 🔄',
                x: width/2,
                y: height/2,
                speed: 1,
                alpha: 1,
                size: 20,
                hue: 200
            });
        });
        
        shapeSlider.addEventListener('input', (e) => {
            shapeCount = parseInt(e.target.value);
            countValSpan.innerText = shapeCount;
            initShapes();
        });
        
        speedSlider.addEventListener('input', (e) => {
            rotationSpeed = parseFloat(e.target.value);
            speedValSpan.innerText = rotationSpeed.toFixed(4);
        });
        
        chaosBtn.addEventListener('click', () => {
            for(let s of shapesArray) {
                s.radius = Math.max(8, Math.min(45, s.radius + (Math.random()-0.5)*12));
                s.type = Math.floor(Math.random()*3);
            }
            lastEffectSpan.innerText = '🔥 CHAOS MODE! 🔥';
            floatingTexts.push({
                text: '🌀 CHAOS! 🌀',
                x: width/2,
                y: height/2,
                speed: 1.2,
                alpha: 1,
                size: 22,
                hue: Math.random() * 360
            });
            setTimeout(()=>{
                if(lastEffectSpan.innerText === '🔥 CHAOS MODE! 🔥') 
                    lastEffectSpan.innerText = lastEffectMsg;
            }, 1000);
        });
        
        hueSlider.addEventListener('input', (e) => {
            globalHue = parseInt(e.target.value);
            hueValSpan.innerText = globalHue;
        });
        
        particleCountSlider.addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            partCountSpan.innerText = particleCount;
            initParticles();
        });
        
        toggleWaveBtn.addEventListener('click', () => {
            waveMode = !waveMode;
            toggleWaveBtn.innerText = waveMode ? "🌊 Gelombang AKTIF" : "🌊 Aktifkan Gelombang";
            if(waveMode) {
                floatingTexts.push({
                    text: '🌈 WAVE MODE ON! 🌈',
                    x: width/2,
                    y: height/2,
                    speed: 1,
                    alpha: 1,
                    size: 18,
                    hue: globalHue
                });
            }
        });
        
        darkModeBtn.addEventListener('click', () => {
            darkMode = !darkMode;
            if(darkMode) {
                document.body.classList.add('dark-mode-active');
                darkModeBtn.innerHTML = '☀️ Mode Terang';
                floatingTexts.push({
                    text: '🌙 DARK MODE 🌙',
                    x: width/2,
                    y: height/2,
                    speed: 1,
                    alpha: 1,
                    size: 20,
                    hue: 280
                });
            } else {
                document.body.classList.remove('dark-mode-active');
                darkModeBtn.innerHTML = '🌙 Mode Malam Gelap';
                floatingTexts.push({
                    text: '☀️ LIGHT MODE ☀️',
                    x: width/2,
                    y: height/2,
                    speed: 1,
                    alpha: 1,
                    size: 20,
                    hue: 60
                });
            }
        });
        
        dynCanvas.addEventListener('mousemove', (e) => {
            const rect = dynCanvas.getBoundingClientRect();
            const scaleX = dynCanvas.width / rect.width;
            const scaleY = dynCanvas.height / rect.height;
            let mouseXCanvas = (e.clientX - rect.left) * scaleX;
            let mouseYCanvas = (e.clientY - rect.top) * scaleY;
            mouseCanvasX = Math.min(width, Math.max(0, mouseXCanvas));
            mouseCanvasY = Math.min(height, Math.max(0, mouseYCanvas));
            mouseCoordSpan.innerText = `${Math.floor(mouseCanvasX)},${Math.floor(mouseCanvasY)}`;
            mousePresent = true;
            
            // Tambah teks kecil saat mouse bergerak
            if(Math.random() < 0.05) {
                floatingTexts.push({
                    text: '✨',
                    x: mouseCanvasX,
                    y: mouseCanvasY,
                    speed: 0.8,
                    alpha: 0.8,
                    size: 12 + Math.random() * 8,
                    hue: Math.random() * 360
                });
            }
        });
        
        dynCanvas.addEventListener('mouseleave', () => {
            mousePresent = false;
            mouseCoordSpan.innerText = 'out';
        });
        
        function animate(timestamp) {
            requestAnimationFrame(animate);
            angle += rotationSpeed;
            angleOffset = angle;
            if(waveMode) globalHue = (globalHue + 1.5) % 360;
            hueSlider.value = globalHue;
            hueValSpan.innerText = Math.floor(globalHue);
            
            updateParticles();
            drawParticles(globalHue);
            drawShapes();
            
            if(rippleIntensity > 0) {
                rippleIntensity -= 0.03;
                if(rippleIntensity <= 0) rippleIntensity = 0;
            } else rippleRadius = 5;
        }
        
        function resizeAll() {
            resizeParticleCanvas();
            resizeDynamicCanvas();
            initShapes();
            initParticles();
        }
        
        window.addEventListener('resize', resizeAll);
        resizeAll();
        initShapes();
        requestAnimationFrame(animate);
    })();
</script>
</body>
</html>
